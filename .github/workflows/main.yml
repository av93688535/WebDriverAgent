name: Build WDA for TrollStore

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 1. 拉取源代码
      uses: actions/checkout@v4

    - name: 2. 准备依赖环境
      run: ./Scripts/bootstrap.sh || true

    - name: 3. 使用 Xcode 开始无证书裸编译
      run: |
        xcodebuild build-for-testing \
          -project WebDriverAgent.xcodeproj \
          -scheme WebDriverAgentRunner \
          -destination "generic/platform=iOS" \
          -configuration Release \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: 4. 强制注入签名空间并打包 (解决 Error 175)
      run: |
        mkdir -p Payload
        cp -r ./build/Build/Products/Release-iphoneos/WebDriverAgentRunner-Runner.app Payload/
        codesign --force --deep --sign - Payload/WebDriverAgentRunner-Runner.app
        zip -ry WebDriverAgentRunner.ipa Payload

    - name: 5. 产出并上传安装包文件
      uses: actions/upload-artifact@v4
      with:
        name: WebDriverAgentRunner-IPA
        path: WebDriverAgentRunner.ipa
